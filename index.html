<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CEAPS | Club de Economía, Actualidad Política y Sociedad</title>
    <meta name="description" content="Sitio oficial de CEAPS: boletines, columnas, noticias, eventos, papers y oportunidades del Club de Economía, Actualidad Política y Sociedad.">
    <meta name="theme-color" content="#201e1e">
    <meta property="og:title" content="CEAPS">
    <meta property="og:description" content="Club de Economía, Actualidad Política y Sociedad.">
    <meta property="og:type" content="website">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css?v=20260528-mobile-fit">
    <script type="module" src="assets/js/app.js?v=20260528-mobile-fit"></script>
  </head>
  <body>
    <a class="skip-link" href="#contenido">Saltar al contenido</a>

    <header class="site-header" data-header>
      <div class="shell header-inner">
        <a class="brand" href="index.html" aria-label="Ir al inicio">
          <img class="university-logo" src="assets/img/brand/uai-sin-escudo.png" alt="Universidad Adolfo Ibáñez">
          <span class="brand-mark" aria-hidden="true"><img src="assets/img/brand/ceaps-lambda.png" alt=""></span>
          <span class="brand-copy">
            <strong class="brand-word">CE<span>Λ</span>PS</strong>
            <small data-site-kicker>Club universitario</small>
          </span>
        </a>

        <nav class="desktop-nav" aria-label="Navegación principal" data-nav></nav>
        <a class="header-cta" href="index.html#suscripcion">Suscribirse al boletín</a>

        <button class="icon-button menu-toggle" type="button" aria-label="Abrir menú" aria-expanded="false" data-menu-toggle>
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>

      <nav class="mobile-nav" aria-label="Navegación móvil" data-mobile-nav></nav>
      <a class="mobile-cta" href="index.html#suscripcion">Suscribirse al boletín</a>
    </header>

    <main id="contenido">
      <section class="hero section-dark" data-hero>
        <div class="shell hero-grid">
          <div class="hero-copy">
            <p class="eyebrow" data-hero-kicker>Cargando...</p>
            <h1 data-hero-title>CEAPS</h1>
            <p class="hero-lede" data-hero-description></p>
            <div class="hero-actions" data-hero-actions></div>
          </div>
        </div>
      </section>

      <section class="quick-strip section-gold" aria-label="Publicaciones destacadas">
        <div class="shell quick-grid" data-featured-strip></div>
      </section>

      <section class="content-band" id="ultimas">
        <div class="shell section-heading">
          <p class="eyebrow" data-latest-kicker></p>
          <h2 data-latest-title></h2>
          <p data-latest-description></p>
        </div>
        <div class="shell card-grid latest-grid" data-latest-grid></div>
      </section>

      <section class="content-band section-muted" id="boletin">
        <div class="shell section-heading split-heading">
          <div>
            <p class="eyebrow" data-newsletter-kicker></p>
            <h2 data-newsletter-title></h2>
          </div>
          <a class="text-link" href="#suscripcion" data-newsletter-cta></a>
        </div>
        <div class="shell newsletter-layout">
          <div data-newsletter-feature></div>
          <div class="stack-list" data-newsletter-list></div>
        </div>
      </section>

      <section class="content-band" id="columnas">
        <div class="shell section-heading split-heading">
          <div>
            <p class="eyebrow" data-columns-kicker></p>
            <h2 data-columns-title></h2>
            <p data-columns-description></p>
          </div>
          <div class="segmented-control" role="tablist" aria-label="Filtrar columnas" data-column-filters></div>
        </div>
        <div class="shell card-grid columns-grid" data-columns-grid></div>
      </section>

      <section class="content-band section-ink" id="noticias-eventos">
        <div class="shell section-heading">
          <p class="eyebrow" data-news-events-kicker></p>
          <h2 data-news-events-title></h2>
          <p data-news-events-description></p>
        </div>
        <div class="shell editorial-two-col">
          <div>
            <h3 data-news-title></h3>
            <div class="stack-list" data-news-list></div>
          </div>
          <div>
            <h3 data-events-title></h3>
            <div class="stack-list" data-events-list></div>
          </div>
        </div>
      </section>

      <section class="content-band" id="papers">
        <div class="shell section-heading split-heading">
          <div>
            <p class="eyebrow" data-papers-kicker></p>
            <h2 data-papers-title></h2>
            <p data-papers-description></p>
          </div>
        </div>
        <div class="shell paper-grid" data-papers-grid></div>
      </section>

      <section class="content-band section-muted" id="oportunidades">
        <div class="shell section-heading">
          <p class="eyebrow" data-opportunities-kicker></p>
          <h2 data-opportunities-title></h2>
          <p data-opportunities-description></p>
        </div>
        <div class="shell card-grid opportunities-grid" data-opportunities-grid></div>
      </section>

      <section class="content-band" id="sobre">
        <div class="shell about-layout">
          <div class="section-heading align-left">
            <p class="eyebrow" data-about-kicker></p>
            <h2 data-about-title></h2>
            <p data-about-description></p>
            <a class="button button-dark about-action" href="equipo.html" data-about-action></a>
          </div>
          <div class="about-values" data-about-values></div>
        </div>
      </section>

      <section class="content-band subscribe-band" id="suscripcion">
        <div class="shell subscribe-layout">
          <div>
            <p class="eyebrow" data-subscribe-kicker></p>
            <h2 data-subscribe-title></h2>
            <p data-subscribe-description></p>
          </div>
          <form class="subscribe-form" data-subscribe-form>
            <label for="email">Correo institucional o personal</label>
            <div class="form-row">
              <input id="email" name="email" type="email" autocomplete="email" placeholder="nombre@universidad.cl" required>
              <button class="button button-primary" type="submit" data-subscribe-button></button>
            </div>
            <p class="form-note" data-subscribe-note></p>
          </form>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="shell footer-grid">
        <div>
          <a class="brand footer-brand" href="index.html" aria-label="Ir al inicio">
            <img class="university-logo" src="assets/img/brand/uai-sin-escudo.png" alt="Universidad Adolfo Ibáñez">
            <span class="brand-mark" aria-hidden="true"><img src="assets/img/brand/ceaps-lambda.png" alt=""></span>
            <span class="brand-copy">
              <strong class="brand-word">CE<span>Λ</span>PS</strong>
              <small data-footer-description></small>
            </span>
          </a>
        </div>
        <nav aria-label="Navegación de pie de página" data-footer-nav></nav>
        <p data-footer-copy></p>
      </div>
    </footer>
  </body>
</html>
